version: "3.9"

services:
  # ─── Backend: FastAPI inference engine ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fraud_backend
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=${MODEL_NAME:-fraud-detector}
      - MODEL_STAGE=${MODEL_STAGE:-Production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./mlflow:/mlflow
      - ./data:/data
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fraud_net
    restart: unless-stopped

  # ─── Frontend: React web portal ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fraud_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - fraud_net
    restart: unless-stopped

  # ─── MLflow tracking + model registry ────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: fraud_mlflow
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --backend-store-uri sqlite:////mlflow/mlflow.db
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fraud_net
    restart: unless-stopped

  # ─── Airflow: Data pipeline orchestration ────────────────────────────────────
  airflow:
    image: apache/airflow:2.9.0-python3.11
    container_name: fraud_airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:-supersecret}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/data
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
               --firstname Admin --lastname User --role Admin
               --email admin@example.com || true &&
               airflow webserver & airflow scheduler"
    networks:
      - fraud_net
    restart: unless-stopped

  # ─── Prometheus: Metrics collection ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fraud_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - fraud_net
    restart: unless-stopped

  # ─── Grafana: Visualization dashboards ───────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: fraud_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - fraud_net
    restart: unless-stopped

volumes:
  grafana_data:
  airflow_logs:

networks:
  fraud_net:
    driver: bridge
