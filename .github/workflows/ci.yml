name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Lint + unit tests ───────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Create required directories
        run: |
          mkdir -p mlflow/artifacts
          mkdir -p metrics
          mkdir -p data/raw data/processed data/features

      - name: Lint with ruff
        run: ruff check backend/app scripts --ignore E501
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest backend/tests/ -v --cov=backend/app --cov-report=xml
        env:
          MLFLOW_TRACKING_URI: "sqlite:///test_mlflow.db"
          MODEL_NAME: "fraud-detector"
          MODEL_STAGE: "Production"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Job 2: DVC pipeline check ──────────────────────────────────────────────
  dvc-check:
    name: DVC Pipeline Status
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install DVC
        run: pip install dvc==3.51.2

      - name: Initialize DVC
        run: dvc init --no-scm || true

      - name: Check DVC pipeline definition
        run: dvc dag

  # ── Job 3: Docker build ────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t fraud-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t fraud-frontend:${{ github.sha }} ./frontend

      - name: Test docker-compose config
        run: docker compose config

  # ── Job 4: Integration smoke test ─────────────────────────────────────────
  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create required directories
        run: |
          mkdir -p mlflow/artifacts
          mkdir -p metrics

      - name: Start stack
        run: |
          docker compose up -d mlflow
          sleep 60
          docker compose up -d backend
          sleep 30

      - name: Health check
        run: |
          curl -f http://localhost:8800/health || exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v